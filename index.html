<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Crypto Cash — Premium UI</title>
  <meta name="theme-color" content="#0b0f16" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="shell">
    <section class="topbar card glass">
      <div class="pill-row">
        <div class="pill">PRIVATE DESK</div>
        <div class="pill">FAST DEALS</div>
      </div>
      <div class="user-chip">
        <div class="avatar" id="clientAvatar">C</div>
        <div class="user-meta">
          <div class="user-name" id="clientNameTop">Клиент</div>
          <div class="user-id" id="clientIdTop">ID: —</div>
        </div>
      </div>
    </section>

    <section class="hero card">
      <div class="hero-logo">
        <img src="logo.png" class="logo-img"/>
      </div>
      <div>
        <div class="eyebrow">PRIVATE EXCHANGE DESK</div>
        <h1>Crypto Cash</h1>
        <p class="lead">Премиальный обмен USDT, USDC, USD, EUR и RUB.</p>
      </div>
    </section>

    <script src="app.js"></script>
</body>
</html>
